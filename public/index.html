<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forkline Web</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-copy">
          <strong>Forkline</strong>
          <span>中文 Git 可视化工作台</span>
        </div>
      </div>

      <div class="repo-bar">
        <div class="repo-pill">
          <span class="status-dot"></span>
          <div>
            <strong id="repoName">示例仓库</strong>
            <span id="repoPath">未连接真实仓库</span>
          </div>
        </div>
        <div class="path-open">
          <input id="repoInput" autocomplete="off" spellcheck="false" placeholder="输入本机 Git 仓库路径，例如 D:\project\demo" />
          <button id="openRepo" class="btn primary" type="button">打开</button>
        </div>
        <label class="search">
          <span aria-hidden="true"></span>
          <input id="searchInput" type="search" placeholder="搜索提交、作者、分支或 SHA" />
        </label>
      </div>

      <div class="actions">
        <button id="themeToggle" class="icon-btn theme-toggle" title="切换浅色/深色" type="button">浅色</button>
        <button class="icon-btn" data-action="fetch" title="抓取" type="button">抓取</button>
        <button class="icon-btn" data-action="pull" title="拉取" type="button">拉取</button>
        <button class="icon-btn" data-action="push" title="推送" type="button">推送</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar">
        <section class="repo-card">
          <div class="avatar">FL</div>
          <div>
            <strong id="sideRepoName">atlas-dashboard</strong>
            <span id="sideRepoBranch">feature/visual-history</span>
          </div>
        </section>

        <section class="side-section">
          <div class="side-title branch-title">
            <span>本地分支</span>
            <button id="newBranch" class="mini-btn side-mini" type="button">新建</button>
          </div>
          <div id="branchList" class="nav-list"></div>
        </section>

        <section class="side-section">
          <div class="side-title">远端分支</div>
          <div id="remoteList" class="nav-list"></div>
        </section>

        <section class="worktree">
          <div class="side-title">工作区</div>
          <div id="worktreeList" class="file-stack"></div>
        </section>
      </aside>

      <div class="workspace-resizer" data-resizer="sidebar" title="拖拽调整左侧栏"></div>

      <main class="main">
        <nav id="branchStrip" class="branch-strip"></nav>

        <section class="history">
          <div class="history-head">
            <span class="graph-head"><b>图谱</b><em id="graphModeLabel">全部分支</em></span>
            <span>提交信息</span>
            <span>作者</span>
            <span>时间</span>
            <span>SHA</span>
          </div>
          <div id="historyScroll" class="history-scroll">
            <div id="commitGraph" class="commit-graph"></div>
          </div>
        </section>

        <section class="stage">
          <div class="stage-resizer-y" data-resizer="stage" title="拖拽调整变更面板高度"></div>
          <div class="changes">
            <div class="panel-title">
              <span>未暂存的更改</span>
              <div class="panel-actions">
                <button id="refreshChanges" class="mini-btn" type="button" title="刷新工作区更改">刷新</button>
                <button id="stashChanges" class="mini-btn" type="button" title="储藏全部未提交更改">储藏</button>
                <button id="stageAll" class="mini-btn" type="button" title="暂存全部更改">暂存</button>
                <button id="discardAll" class="mini-btn danger" type="button" title="丢弃全部未提交更改">丢弃</button>
              </div>
            </div>
            <div id="changeList" class="change-list"></div>
          </div>
          <div class="stage-split-resizer" data-resizer="changes" title="拖拽调整变更文件宽度"></div>
          <div class="stage-workbench">
            <section class="work-diff">
              <div class="panel-title">
                <div class="panel-title-text">
                  <span id="workDiffTitle">变更对照</span>
                  <span id="workDiffPath" class="panel-subtitle">未选择文件</span>
                </div>
                <button id="maximizeDiff" class="mini-btn diff-max-btn" type="button" disabled>最大化</button>
              </div>
              <div id="workDiffView" class="work-diff-view empty">未选择文件</div>
            </section>
            <div class="workbench-resizer-y" data-resizer="commitForm" title="拖拽调整提交框高度"></div>
            <form id="commitForm" class="commit-form">
              <input id="commitSummary" autocomplete="off" placeholder="提交摘要" />
              <textarea id="commitBody" placeholder="提交说明"></textarea>
              <div class="commit-bottom">
                <span id="draftNote">示例模式</span>
                <div class="commit-actions">
                  <label class="amend-toggle" title="勾选后使用上一次提交信息并追加到上一次提交">
                    <input id="amendToggle" type="checkbox" />
                    <span>追加</span>
                  </label>
                  <button id="commitSubmit" class="btn primary" type="submit">创建提交</button>
                </div>
              </div>
            </form>
          </div>
        </section>
      </main>

      <div class="workspace-resizer" data-resizer="inspector" title="拖拽调整右侧栏"></div>

      <aside class="inspector">
        <header class="detail-head">
          <div id="detailNode" class="detail-node"></div>
          <div>
            <strong id="detailTitle">提交详情</strong>
            <span id="detailSub">选择提交查看详情</span>
          </div>
        </header>

        <div class="tabs">
          <button class="tab active" data-tab="details" type="button">详情</button>
          <button class="tab" data-tab="files" type="button">文件</button>
          <button class="tab" data-tab="branches" type="button">分支</button>
          <button class="tab" data-tab="stashes" type="button">储藏</button>
          <button class="tab" data-tab="tags" type="button">标签</button>
        </div>

        <div id="detailBody" class="detail-body"></div>
      </aside>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="commitContextMenu" class="context-menu" aria-hidden="true">
    <button data-commit-action="details" type="button">查看详情</button>
    <button data-commit-action="branch" type="button">从此提交新建分支</button>
    <button data-commit-action="tag" type="button">创建 Tag</button>
    <div class="context-separator" role="separator"></div>
    <button data-commit-action="copySha" type="button">复制 SHA</button>
    <button data-commit-action="copyMessage" type="button">复制提交信息</button>
    <button data-commit-action="editMessage" type="button">修改提交信息</button>
    <div class="context-separator" role="separator"></div>
    <button data-commit-action="cherryPick" type="button"><span class="menu-label">挑选此提交</span><span class="command-hint">git cherry-pick</span></button>
    <button data-commit-action="revert" type="button"><span class="menu-label">还原此提交</span><span class="command-hint">git revert</span></button>
    <button data-commit-action="resetSoft" type="button"><span class="menu-label">软重置到此提交</span><span class="command-hint">git reset --soft</span></button>
    <button data-commit-action="resetMixed" type="button"><span class="menu-label">混合重置到此提交</span><span class="command-hint">git reset --mixed</span></button>
    <button data-commit-action="resetHard" class="danger" type="button"><span class="menu-label">硬重置到此提交</span><span class="command-hint">git reset --hard</span></button>
  </div>
  <div id="branchContextMenu" class="context-menu" aria-hidden="true">
    <button data-branch-action="view" type="button">查看此分支提交</button>
    <button data-branch-action="checkout" type="button">切换到此分支</button>
    <button data-branch-action="merge" type="button">合并分支到当前分支</button>
    <button data-branch-action="rebase" type="button"><span class="menu-label">变基当前分支到此分支</span><span class="command-hint">git rebase</span></button>
    <button data-branch-action="cleanup" type="button" hidden>清理失效占用</button>
    <button data-branch-action="branch" type="button">从此分支新建分支</button>
    <button data-branch-action="copy" type="button">复制分支名</button>
    <button data-branch-action="rename" type="button">重命名分支</button>
    <button data-branch-action="delete" type="button">删除分支</button>
  </div>
  <div id="fileContextMenu" class="context-menu" aria-hidden="true">
    <button data-file-action="diff" type="button">查看对照</button>
    <button data-file-action="stash" type="button">储藏所选</button>
    <button data-file-action="stageFile" type="button">暂存</button>
    <button data-file-action="unstageFile" type="button">取消暂存</button>
    <button data-file-action="discardWorktreeFile" type="button">丢弃工作区改动</button>
    <button data-file-action="discardStagedFile" type="button">丢弃已暂存改动</button>
  </div>
  <div id="tagContextMenu" class="context-menu" aria-hidden="true">
    <button data-tag-action="view" type="button">查看此 Tag 提交</button>
    <button data-tag-action="copy" type="button">复制 Tag 名称</button>
    <div class="context-separator" role="separator"></div>
    <button data-tag-action="push" type="button"><span class="menu-label">推送 Tag</span><span class="command-hint">git push</span></button>
    <button data-tag-action="deleteLocal" class="danger" type="button"><span class="menu-label">删除本地 Tag</span><span class="command-hint">git tag -d</span></button>
    <button data-tag-action="deleteRemote" class="danger" type="button"><span class="menu-label">删除远端 Tag</span><span class="command-hint">git push --delete</span></button>
  </div>
  <div id="checkoutModal" class="checkout-modal" aria-hidden="true">
    <div class="checkout-dialog" role="dialog" aria-modal="true" aria-labelledby="checkoutModalTitle">
      <div class="checkout-warning">
        <div class="checkout-icon">!</div>
        <div>
          <strong id="checkoutModalTitle">签出会覆盖本地更改。</strong>
          <span id="checkoutModalText">当前工作区有未提交的更改。</span>
        </div>
      </div>
      <div class="checkout-actions">
        <button class="checkout-choice primary" data-checkout-mode="stash" type="button">储藏并签出</button>
        <button class="checkout-choice" data-checkout-mode="keep" type="button">迁移更改</button>
        <button class="checkout-choice danger" data-checkout-mode="force" type="button">强制签出</button>
        <button class="checkout-choice" data-checkout-mode="cancel" type="button">取消</button>
      </div>
    </div>
  </div>
  <div id="stashRestoreModal" class="checkout-modal" aria-hidden="true">
    <div class="checkout-dialog" role="dialog" aria-modal="true" aria-labelledby="stashRestoreTitle">
      <div class="checkout-warning">
        <div class="checkout-icon">!</div>
        <div>
          <strong id="stashRestoreTitle">发现可恢复的储藏更改。</strong>
          <span id="stashRestoreText">刚才储藏的本地更改可以恢复到当前分支。</span>
        </div>
      </div>
      <div class="checkout-actions stash-restore-actions">
        <button class="checkout-choice primary" data-stash-restore="restore" type="button">恢复更改</button>
        <button class="checkout-choice" data-stash-restore="keep" type="button">暂不恢复</button>
      </div>
    </div>
  </div>
  <div id="branchModal" class="checkout-modal" aria-hidden="true">
    <form id="branchForm" class="checkout-dialog branch-dialog" role="dialog" aria-modal="true" aria-labelledby="branchModalTitle">
      <div class="checkout-warning">
        <div class="checkout-icon branch-icon">+</div>
        <div>
          <strong id="branchModalTitle">新建分支</strong>
          <span id="branchStartText">从当前 HEAD 创建分支。</span>
        </div>
      </div>
      <div class="branch-form-body">
        <label class="edit-field">
          <span>分支名</span>
          <input id="branchNameInput" autocomplete="off" spellcheck="false" placeholder="例如 feature/login" />
        </label>
        <label id="branchCheckoutLabel" class="amend-toggle branch-check-toggle">
          <input id="branchCheckoutToggle" type="checkbox" checked />
          <span>创建后切换</span>
        </label>
      </div>
      <div class="checkout-actions branch-actions">
        <button id="branchSubmit" class="checkout-choice primary" type="submit">创建分支</button>
        <button id="branchCancel" class="checkout-choice" type="button">取消</button>
      </div>
    </form>
  </div>
  <div id="tagModal" class="checkout-modal" aria-hidden="true">
    <form id="tagForm" class="checkout-dialog tag-dialog" role="dialog" aria-modal="true" aria-labelledby="tagModalTitle">
      <div class="checkout-warning">
        <div class="checkout-icon branch-icon">#</div>
        <div>
          <strong id="tagModalTitle">创建 Tag</strong>
          <span id="tagStartText">基于选中的提交创建 Tag。</span>
        </div>
      </div>
      <div class="branch-form-body">
        <label class="edit-field">
          <span>Tag 名称</span>
          <input id="tagNameInput" autocomplete="off" spellcheck="false" placeholder="例如 v1.0.0" />
        </label>
        <label class="amend-toggle branch-check-toggle">
          <input id="tagAnnotatedToggle" type="checkbox" />
          <span>附注 Tag</span>
        </label>
        <label class="edit-field">
          <span>说明</span>
          <textarea id="tagMessageInput" placeholder="附注 Tag 说明，可留空"></textarea>
        </label>
      </div>
      <div class="checkout-actions branch-actions">
        <button id="tagSubmit" class="checkout-choice primary" type="submit">创建 Tag</button>
        <button id="tagCancel" class="checkout-choice" type="button">取消</button>
      </div>
    </form>
  </div>
  <div id="mainlineModal" class="checkout-modal" aria-hidden="true">
    <form id="mainlineForm" class="checkout-dialog mainline-dialog" role="dialog" aria-modal="true" aria-labelledby="mainlineModalTitle">
      <div class="checkout-warning">
        <div class="checkout-icon branch-icon">M</div>
        <div>
          <strong id="mainlineModalTitle">选择主线</strong>
          <span id="mainlineStartText">这个 merge 提交需要指定父提交主线。</span>
        </div>
      </div>
      <div class="branch-form-body">
        <div id="mainlineOptions" class="mainline-options"></div>
      </div>
      <div class="checkout-actions branch-actions">
        <button id="mainlineSubmit" class="checkout-choice primary" type="submit">继续操作</button>
        <button id="mainlineCancel" class="checkout-choice" type="button">取消</button>
      </div>
    </form>
  </div>
  <div id="diffModal" class="diff-modal" aria-hidden="true">
    <div class="diff-modal-head">
      <div>
        <strong id="diffModalTitle">变更对照</strong>
        <span id="diffModalPath"></span>
      </div>
      <button id="closeDiffModal" class="icon-btn" type="button">关闭</button>
    </div>
    <div id="diffModalBody" class="diff-modal-body"></div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
